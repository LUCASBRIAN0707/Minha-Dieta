<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador Avançado de Dieta</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  
  <nav class="navbar">
        <div class="logo">
            <img src="img/logo.jpeg" alt="logo Lb">
            <span>Lucas Brian</span>

        </div>

  <h1>Gerador Avançado de Dieta</h1>
  <p>Digite seu peso (kg) e altura (cm):</p>
  <input type="number" id="peso" placeholder="Peso em kg">
  <input type="number" id="altura" placeholder="Altura em cm">

  <p>Objetivo:</p>
  <select id="objetivo">
    <option value="ganhar">Ganhar Peso</option>
    <option value="perder">Perder Peso</option>
    <option value="manter">Manter Peso</option>
  </select>

  <br>
  <button onclick="gerarDieta()">Gerar Dieta</button>

  <div id="resultado">

  </div>

<script src="script.js"></script>

</body>
</html>
